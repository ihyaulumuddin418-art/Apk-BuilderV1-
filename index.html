<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --danger: #ff4757;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --card-glow: 0 0 40px rgba(0,255,136,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeDown 0.6s ease;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .logo-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  h1 {
    font-size: clamp(36px, 7vw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  .subtitle {
    color: var(--muted);
    margin-top: 16px;
    font-size: 15px;
    letter-spacing: 0.5px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .tab:hover:not(.active) { color: var(--text); }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: var(--card-glow);
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }

  select option { background: var(--surface2); }

  /* Icon upload */
  .icon-upload-wrapper {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .icon-preview {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    border: 2px dashed var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    flex-shrink: 0;
  }

  .icon-preview:hover { border-color: var(--accent); }

  .icon-preview img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }

  .icon-placeholder {
    font-size: 28px;
    opacity: 0.4;
  }

  .icon-upload-info { flex: 1; }

  .icon-upload-info small {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }

  /* File dropzone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(0,255,136,0.04);
  }

  .dropzone-icon { font-size: 32px; margin-bottom: 8px; }

  .dropzone p { color: var(--muted); font-size: 14px; }
  .dropzone strong { color: var(--text); }

  /* File list */
  .file-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 180px;
    overflow-y: auto;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }

  .file-ext {
    background: rgba(0,255,136,0.1);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    font-weight: 700;
  }

  .file-name { flex: 1; color: var(--text); }
  .file-size { color: var(--muted); font-size: 11px; }

  .file-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.2s;
  }
  .file-remove:hover { color: var(--danger); }

  /* Token section */
  .token-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .token-row .form-group { flex: 1; }

  .btn-ghost {
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  /* Build button */
  .btn-build {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 24px;
    position: relative;
    overflow: hidden;
  }

  .btn-build:hover {
    background: #00ffaa;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(0,255,136,0.3);
  }

  .btn-build:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-build::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-build:hover::after { transform: translateX(100%); }

  /* Build status */
  .build-status {
    margin-top: 20px;
    padding: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: none;
  }

  .build-status.show { display: block; }

  .status-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .status-dot.running { animation: pulse 1s infinite; }
  .status-dot.error { background: var(--danger); animation: none; }
  .status-dot.done { background: var(--accent); animation: none; }

  .status-label {
    font-weight: 700;
    font-size: 14px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .status-log {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.8;
  }

  /* History */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease;
  }

  .history-item:hover { border-color: rgba(0,255,136,0.3); }

  .history-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .history-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 12px;
  }

  .history-info { flex: 1; }

  .history-name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .history-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .meta-tag span { color: var(--accent); }

  .history-status {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .status-success {
    background: rgba(0,255,136,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,255,136,0.2);
  }

  .status-building {
    background: rgba(124,58,237,0.1);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.2);
  }

  .status-failed {
    background: rgba(255,71,87,0.1);
    color: var(--danger);
    border: 1px solid rgba(255,71,87,0.2);
  }

  .history-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .btn-icon:hover { color: var(--text); border-color: var(--text); }
  .btn-icon.danger:hover { color: var(--danger); border-color: var(--danger); }
  .btn-icon.download:hover { color: var(--accent); border-color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(0,255,136,0.3); color: var(--accent); }
  .toast.error { border-color: rgba(255,71,87,0.3); color: var(--danger); }

  /* Tab content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  input[type="file"] { display: none; }

  .section-gap { margin-bottom: 24px; }
</style>
</head>
<body>
<div class="noise"></div>

<div class="container">
  <header>
    <div class="logo-badge">
      <div class="logo-dot"></div>
      APK BUILDER
    </div>
    <h1>Build <span>Android</span><br>Apps Instantly</h1>
    <p class="subtitle">Upload HTML/CSS/JS → Get APK. Powered by GitHub Actions.</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('build')">🔨 Build APK</button>
    <button class="tab" onclick="switchTab('history')">📦 History</button>
    <button class="tab" onclick="switchTab('settings')">⚙️ Settings</button>
  </div>

  <!-- BUILD TAB -->
  <div id="tab-build" class="tab-content active">
    <div class="card">
      <div class="card-title">App Info</div>

      <div class="form-grid">
        <div class="form-group">
          <label>App Name</label>
          <input type="text" id="appName" placeholder="My Awesome App">
        </div>
        <div class="form-group">
          <label>Version</label>
          <select id="appVersion">
            <option value="1.0.0">1.0.0 — Initial Release</option>
            <option value="1.1.0">1.1.0 — Minor Update</option>
            <option value="1.2.0">1.2.0</option>
            <option value="2.0.0">2.0.0 — Major Release</option>
            <option value="custom">Custom...</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Package Name</label>
          <input type="text" id="packageName" placeholder="com.yourname.appname">
        </div>
        <div class="form-group full">
          <label>App Icon</label>
          <div class="icon-upload-wrapper">
            <div class="icon-preview" onclick="document.getElementById('iconInput').click()" id="iconPreview">
              <span class="icon-placeholder">📱</span>
            </div>
            <div class="icon-upload-info">
              <button class="btn-ghost" onclick="document.getElementById('iconInput').click()" style="width:100%; text-align:left; font-family:'Syne',sans-serif; font-size:13px; font-weight:600; color:var(--text);">
                📂 Pilih Icon
              </button>
              <small>PNG/JPG, rekomendasi 512×512px</small>
            </div>
          </div>
          <input type="file" id="iconInput" accept="image/*" onchange="handleIcon(this)">
        </div>
      </div>

      <div class="card-title" style="margin-top:8px;">App Files</div>

      <div class="dropzone" id="dropzone"
        ondrop="handleDrop(event)"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)"
        onclick="document.getElementById('filesInput').click()">
        <div class="dropzone-icon">📁</div>
        <p><strong>Drop files here</strong> atau klik untuk pilih</p>
        <p style="font-size:12px; margin-top:4px;">HTML, CSS, JS, images, dll</p>
      </div>
      <input type="file" id="filesInput" multiple onchange="handleFiles(this.files)">

      <div class="file-list" id="fileList"></div>

      <button class="btn-build" onclick="startBuild()" id="buildBtn">
        🚀 BUILD APK
      </button>

      <div class="build-status" id="buildStatus">
        <div class="status-header">
          <div class="status-dot running" id="statusDot"></div>
          <span class="status-label" id="statusLabel">Memulai build...</span>
          <div style="margin-left:auto; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted)" id="statusTime"></div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-log" id="statusLog"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="tab-content">
    <div class="card">
      <div class="card-title">Build History</div>
      <div class="history-list" id="historyList">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>Belum ada APK yang dibuat</p>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div id="tab-settings" class="tab-content">
    <div class="card">
      <div class="card-title">GitHub Config</div>

      <div class="form-group section-gap">
        <label>GitHub Username</label>
        <input type="text" id="ghUsername" placeholder="ihyaulumuddin418-art" value="ihyaulumuddin418-art">
      </div>

      <div class="form-group section-gap">
        <label>Repository Name</label>
        <input type="text" id="ghRepo" placeholder="Apk BuilderV1" value="Apk BuilderV1">
      </div>

      <div class="form-group section-gap">
        <label>Personal Access Token</label>
        <div class="token-row">
          <div class="form-group" style="margin:0">
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
          </div>
          <button class="btn-ghost" onclick="toggleToken()" title="Toggle visibility">👁</button>
        </div>
      </div>

      <button class="btn-build" onclick="saveSettings()">💾 SIMPAN SETTINGS</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let uploadedFiles = [];
  let iconBase64 = null;
  let buildHistory = JSON.parse(localStorage.getItem('apk_history') || '[]');
  let pollInterval = null;

  // Init
  loadSettings();
  renderHistory();

  // Tab switching
  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'history') renderHistory();
  }

  // Icon handler
  function handleIcon(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      iconBase64 = e.target.result;
      const preview = document.getElementById('iconPreview');
      preview.innerHTML = `<img src="${iconBase64}" alt="icon">`;
    };
    reader.readAsDataURL(file);
  }

  // File handlers
  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.add('dragover');
  }

  function handleDragLeave(e) {
    document.getElementById('dropzone').classList.remove('dragover');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  }

  function ha
